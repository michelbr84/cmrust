<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futebol Simulador 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="app">
    <!-- Screen 1: Language Selection -->
    <div id="screen-language" class="screen active">
      <div class="flags-container" id="flags-grid">
        <!-- Flags will be injected here by JS -->
      </div>
    </div>

    <!-- Screen 2: Start Menu -->
    <div id="screen-start" class="screen">
      <h1 class="game-title" id="game-title">Futebol Simulador</h1>
      <div class="menu-container" id="menu-buttons">
        <!-- Buttons will be injected here -->
      </div>
    </div>

    <!-- Screen 3: New Game -->
    <div id="screen-newgame" class="screen">
      <h2 class="game-subtitle" style="font-size: 2rem; margin-bottom: 2rem;">New Manager Profile</h2>
      <div class="form-container">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="manager-name" placeholder="Name" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="manager-surname" placeholder="Surname" />
        </div>
        <div class="form-group">
          <label>Nationality</label>
          <select id="manager-nationality">
            <!-- Populated by JS -->
          </select>
        </div>

        <div class="form-group">
          <label>Select Team (Choose one)</label>
          <div id="team-selection-grid" class="team-grid">
            <!-- Populated by JS -->
            <div class="team-card">Loading teams...</div>
          </div>
          <input type="hidden" id="selected-team-id" />
        </div>

        <div class="button-row">
          <button class="menu-btn secondary" onclick="app.showScreen('start')">Back</button>
          <button id="btn-start-career" class="menu-btn primary" onclick="app.createCareer()">Start Career</button>
        </div>
      </div>
    </div>

    <!-- Screen 4: Options -->
    <div id="screen-options" class="screen">
      <h2 class="game-subtitle" style="font-size: 2rem; margin-bottom: 2rem;">Options</h2>
      <div class="form-container">
        <div class="form-group">
          <label>Language</label>
          <select id="opt-language" onchange="app.changeLanguage(this.value)">
            <option value="en">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="pt-BR">Português (BR)</option>
            <option value="es">Español</option>
          </select>
        </div>
        <div class="form-group">
          <label>Simulation Speed</label>
          <input type="range" min="1" max="5" value="3" />
        </div>
        <div class="button-row">
          <button class="menu-btn primary" onclick="app.showScreen('start')">Back</button>
        </div>
      </div>
    </div>

    <!-- Screen 5: News (Game Hub) -->
    <div id="screen-news" class="screen">
      <div class="news-container">
        <div class="news-header">
          <div class="header-brand">
            <span class="header-title" id="news-club-name">Club Name</span>
          </div>
          <div class="header-date" id="game-date">
            01 Jan 2026
          </div>
        </div>
        <div class="news-body">
          <div class="news-sidebar" id="news-inbox-list">
            <!-- Messages List -->
          </div>
          <div class="news-content" id="news-article-view">
            <div style="display:flex; height:100%; align-items:center; justify-content:center; color:#666;">
              Select a message to read
            </div>
          </div>
        </div>
        <div class="news-footer"
          style="padding:1rem; border-top:1px solid rgba(255,255,255,0.1); display:flex; gap:1rem; justify-content: flex-end;">
          <button class="menu-btn secondary" style="width:auto; font-size:1rem; padding:0.5rem 1.5rem;"
            onclick="app.showScreen('start')">Save & Exit</button>
          <button class="menu-btn primary" style="width:auto; font-size:1rem; padding:0.5rem 1.5rem;"
            onclick="app.advanceGame()">Continue</button>
        </div>
      </div>
    </div>

  </div>
  <script src="main.js" type="module"></script>
  <script>
    window.addEventListener('error', (event) => {
      const errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.bottom = '0';
      errDiv.style.left = '0';
      errDiv.style.background = 'red';
      errDiv.style.color = 'white';
      errDiv.style.padding = '10px';
      errDiv.style.zIndex = '9999';
      errDiv.textContent = `JS Error: ${event.message} at ${event.filename}:${event.lineno}`;
      document.body.appendChild(errDiv);
    });
  </script>
</body>

</html>
