<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futebol Simulador 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="app">
    <!-- Screen 1: Language Selection -->
    <div id="screen-language" class="screen active">
      <div class="flags-container" id="flags-grid"></div>
    </div>

    <!-- Screen 2: Start Menu -->
    <div id="screen-start" class="screen">
      <h1 class="game-title" id="game-title">Futebol Simulador</h1>
      <div class="menu-container" id="menu-buttons"></div>
    </div>

    <!-- Screen 3: New Game -->
    <div id="screen-newgame" class="screen">
      <h2 style="font-size: 2rem; margin-bottom: 2rem; color:white;">New Manager Profile</h2>
      <div class="form-container">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="manager-name" placeholder="Name" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="manager-surname" placeholder="Surname" />
        </div>
        <div class="form-group">
          <label>Nationality</label>
          <select id="manager-nationality"></select>
        </div>

        <div class="form-group">
          <label>Select Team</label>
          <div id="team-selection-grid" class="team-grid">
            <div class="team-card">Loading teams...</div>
          </div>
          <input type="hidden" id="selected-team-id" />
        </div>

        <div style="display:flex; justify-content: space-between; margin-top: 1rem;">
          <button class="action-btn secondary" onclick="app.showScreen('start')">Back</button>
          <button id="btn-start-career" class="action-btn primary" onclick="app.createCareer()" disabled>Start
            Career</button>
        </div>
      </div>
    </div>

    <!-- Screen 4: Options -->
    <div id="screen-options" class="screen">
      <h2 style="font-size: 2rem; margin-bottom: 2rem; color:white;">Options</h2>
      <div class="form-container" style="width: 500px;">
        <div class="form-group">
          <label>Language</label>
          <select id="opt-language" onchange="app.changeLanguage(this.value)">
            <option value="en">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="pt-BR">Português (BR)</option>
            <option value="es">Español</option>
          </select>
        </div>
        <div class="form-group">
          <label>Simulation Speed</label>
          <input type="range" min="1" max="5" value="3" />
        </div>
        <div style="margin-top: 2rem;">
          <button class="action-btn primary" onclick="app.showScreen('start')">Back</button>
        </div>
      </div>
    </div>

    <!-- Screen 5: Main Hub (CM Layout) -->
    <div id="screen-news" class="screen">
      <div class="cm-layout">

        <!-- 1. Top Bar -->
        <div class="top-bar">
          <div class="brand-section">
            <div class="club-name" id="hud-club-name">Club Name</div>
            <div class="club-meta">
              <span class="meta-item">4th Division</span>
              <span class="meta-item">• Board: Promote</span>
              <span class="meta-item">• Rank: 1st</span>
            </div>
          </div>
          <div class="date-section">
            <div class="game-date" id="hud-game-date">01 Jan 2026</div>
            <div class="game-time">09:00</div>
          </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
          <div class="nav-tab active">Inbox</div>
          <div class="nav-tab">Squad</div>
          <div class="nav-tab">Tactics</div>
          <div class="nav-tab">Transfers</div>
          <div class="nav-tab">Finance</div>
          <div class="nav-tab">Competitions</div>
        </div>

        <!-- 2. Main Content (Split) -->
        <div class="main-content">
          <!-- Left: Inbox List -->
          <div class="inbox-sidebar" id="inbox-list">
            <!-- Items injected by JS -->
          </div>

          <!-- Right: Reading Pane -->
          <div class="reading-pane" id="reading-pane">
            <!-- Article injected by JS -->
            <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#555;">
              Select a message
            </div>
          </div>

          <!-- Squad View (Hidden by default, toggled via tabs) -->
          <div id="squad-view" style="display:none; flex:1; overflow-y:auto; padding:0;">
            <table class="datagrid" id="squad-table">
              <thead>
                <tr>
                  <th width="5%">Pos</th>
                  <th width="35%">Name</th>
                  <th width="10%">Age</th>
                  <th width="15%">Nat</th>
                  <th width="10%">Ovr</th>
                  <th width="15%">Value</th>
                  <th width="10%">Cond</th>
                </tr>
              </thead>
              <tbody>
                <!-- Rows injected by JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- 3. Bottom Bar -->
        <div class="bottom-bar">
          <button class="action-btn secondary" onclick="app.showScreen('start')">Save & Exit</button>
          <button class="action-btn primary" onclick="app.advanceGame()">Continue</button>
        </div>

      </div>
    </div>

  </div>
  <script src="main.js" type="module"></script>
</body>

</html>
